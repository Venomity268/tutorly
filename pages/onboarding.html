<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorly - Get started</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="hero-banner">
        <h1 class="page-title">Tutorly</h1>
        <p class="page-subtitle">Find the right tutor. Book in minutes.</p>
    </div>

    <div class="demo-container">
        <header class="demo-header">
            <div class="logo">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Tutorly</span>
            </div>
            <nav class="demo-nav">
                <button class="nav-btn" data-screen="onboarding" type="button">Onboarding</button>
                <button class="nav-btn" data-screen="search" type="button">Find Tutor</button>
                <button class="nav-btn" data-screen="profile" type="button">Profile</button>
                <button class="nav-btn" data-screen="booking" type="button">Book Session</button>
                <button class="nav-btn" data-screen="dashboard" type="button">Dashboard</button>
                <button class="nav-btn" data-screen="admin" type="button"><i class="fas fa-shield-alt"></i> Admin</button>
                <button class="nav-btn nav-signout" id="nav-signout" type="button" style="display:none"><i class="fas fa-sign-out-alt"></i> Sign out</button>
            </nav>
        </header>

        <main class="demo-content">
            <section id="onboarding" class="screen active">
                <div class="auth-layout">
                    <div class="auth-brand">
                        <div class="auth-brand-icon"><i class="fas fa-graduation-cap"></i></div>
                        <h2>Welcome</h2>
                        <p>Sign in or create an account to connect with qualified tutors and book sessions.</p>
                    </div>
                    <div class="onboarding-form">
                    <div class="auth-mode-toggle">
                        <button class="auth-tab" id="auth-mode-register" type="button" aria-pressed="true">Create Account</button>
                        <button class="auth-tab" id="auth-mode-login" type="button" aria-pressed="false">Sign In</button>
                    </div>
                    <div id="auth-register-fields">
                        <div class="form-group">
                            <label class="form-label" for="auth-full-name">Full Name</label>
                            <input id="auth-full-name" type="text" class="form-input" placeholder="Your name" autocomplete="name" aria-describedby="auth-full-name-error">
                            <div id="auth-full-name-error" class="form-error" role="status" aria-live="polite"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="auth-role">Account Type</label>
                            <select id="auth-role" class="form-input">
                                <option value="student">Student</option>
                                <option value="tutor">Tutor</option>
                            </select>
                        </div>
                        <div class="form-group" id="signup-subjects-wrap">
                            <fieldset class="subject-fieldset" aria-describedby="signup-subjects-error">
                                <legend class="form-label" id="signup-subjects-legend">Subjects <span class="form-label-hint">(select one or more)</span></legend>
                                <div class="subject-chip-grid">
                                    <label class="subject-chip"><input type="checkbox" name="reg-subject" value="mathematics"> Mathematics</label>
                                    <label class="subject-chip"><input type="checkbox" name="reg-subject" value="physics"> Physics</label>
                                    <label class="subject-chip"><input type="checkbox" name="reg-subject" value="chemistry"> Chemistry</label>
                                    <label class="subject-chip"><input type="checkbox" name="reg-subject" value="english"> English</label>
                                    <label class="subject-chip"><input type="checkbox" name="reg-subject" value="computer-science"> Computer Science</label>
                                    <label class="subject-chip"><input type="checkbox" name="reg-subject" value="biology"> Biology</label>
                                </div>
                            </fieldset>
                            <div id="signup-subjects-error" class="form-error" role="status" aria-live="polite"></div>
                        </div>
                        <div class="form-group" id="student-level-group">
                            <label class="form-label" for="student-level">Education Level</label>
                            <select id="student-level" class="form-input" aria-describedby="student-level-error">
                                <option value="">Select level</option>
                                <option value="high-school">High School</option>
                                <option value="university">University</option>
                                <option value="graduate">Graduate</option>
                                <option value="professional">Professional Development</option>
                            </select>
                            <div id="student-level-error" class="form-error" role="status" aria-live="polite"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="auth-email">Email</label>
                        <input id="auth-email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" aria-describedby="auth-email-error">
                        <div id="auth-email-error" class="form-error" role="status" aria-live="polite"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="auth-password">Password</label>
                        <input id="auth-password" type="password" class="form-input" placeholder="At least 8 characters" autocomplete="current-password" aria-describedby="auth-password-error">
                        <div id="auth-password-error" class="form-error" role="status" aria-live="polite"></div>
                    </div>
                    <p class="auth-switch-text" id="auth-switch-text">Already have an account? <button type="button" class="auth-link">Sign in</button></p>
                    <div id="auth-error" class="auth-error" role="alert"></div>
                    <button class="btn-primary" id="auth-submit" type="button">Create Account</button>
                </div>
                </div>
            </section>
        </main>
    </div>
    
    <footer class="demo-footer">
        Tutorly • Built for reliable tutor discovery and booking
    </footer>

    <script src="../scripts/main.js"></script>
</body>
</html>

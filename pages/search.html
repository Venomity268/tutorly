<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorly - Find a tutor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <h1 class="page-title">Tutorly</h1>
    <p class="page-subtitle">Find the right tutor. Book in minutes.</p>
    
    <div class="demo-container">
        <header class="demo-header">
            <div class="logo">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Tutorly</span>
            </div>
            <nav class="demo-nav">
                <button class="nav-btn" data-screen="onboarding" type="button">Onboarding</button>
                <button class="nav-btn" data-screen="search" type="button">Find Tutor</button>
                <button class="nav-btn" data-screen="profile" type="button">Profile</button>
                <button class="nav-btn" data-screen="booking" type="button">Book Session</button>
                <button class="nav-btn" data-screen="dashboard" type="button">Dashboard</button>
                <button class="nav-btn" data-screen="admin" type="button"><i class="fas fa-shield-alt"></i> Admin</button>
                <button class="nav-btn nav-signout" id="nav-signout" type="button" style="display:none"><i class="fas fa-sign-out-alt"></i> Sign out</button>
            </nav>
        </header>

        <main class="demo-content">
            <section id="search" class="screen active">
                <div class="screen-title">
                    <i class="fas fa-search"></i>
                    <span>Find Your Perfect Tutor</span>
                </div>
                <p class="screen-subtitle">Browse tutors by subject, price, and rating. Compare and choose your ideal match.</p>
                
                <div class="search-container">
                    <div class="search-bar">
                        <input type="text" id="search-query" class="search-input" placeholder="Search by subject or tutor name...">
                        <select id="search-subject" class="filter-select">
                            <option value="">All Subjects</option>
                        </select>
                        <select id="search-price" class="filter-select">
                            <option value="">Any Price</option>
                            <option value="20-40">$20–$40/hr</option>
                            <option value="40-60">$40–$60/hr</option>
                            <option value="60+">$60+/hr</option>
                        </select>
                        <button class="btn-primary" id="search-btn" style="width: auto; padding: 15px 30px;">
                            <i class="fas fa-search"></i> Search
                        </button>
                    </div>
                    <div id="search-filter-summary" class="search-filter-summary" aria-live="polite">Showing all tutors</div>
                </div>

                <div id="search-loading" class="search-loading" style="display:none;"><i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Loading tutors...</div>
                <div id="search-empty" class="search-empty" style="display:none;">No tutors found. Try different filters.</div>
                <div class="tutor-grid" id="tutor-grid"></div>
            </section>
        </main>
    </div>
    
    <footer class="demo-footer">
        Tutorly • Built for reliable tutor discovery and booking
    </footer>

    <script src="../scripts/main.js"></script>
</body>
</html>

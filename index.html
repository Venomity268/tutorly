<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorly — Find and book a tutor</title>
    <!-- Font Awesome (kept as CDN for simplicity) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- main stylesheet (external) -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <h1 class="page-title">Tutorly</h1>
    <p class="page-subtitle">Find the right tutor. Book in minutes.</p>
    
    <div class="demo-container">
        <!-- header with navigation (semantic) -->
        <header class="demo-header">
            <div class="logo">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Tutorly</span>
            </div>
            <nav class="demo-nav">
                <button class="nav-btn" data-screen="onboarding">Onboarding</button>
                <button class="nav-btn" data-screen="search">Find Tutor</button>
                <button class="nav-btn" data-screen="profile">Profile</button>
                <button class="nav-btn" data-screen="booking">Book Session</button>
                <button class="nav-btn" data-screen="dashboard">Dashboard</button>
            </nav>
        </header>

        <main class="demo-content">
            <section class="screen active">
                <div class="screen-title">
                    <i class="fas fa-link"></i>
                    <span>Welcome</span>
                </div>
                <p class="screen-subtitle">Choose where you want to start.</p>
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px;">
                    <a class="btn-primary" style="width: auto; padding: 15px 30px;" href="./pages/onboarding.html">Get Started</a>
                    <a class="btn-primary" style="width: auto; padding: 15px 30px;" href="./pages/search.html">Find a Tutor</a>
                </div>
            </section>
        </main>
    </div>
    
    <footer class="demo-footer">
        Tutorly • Built for reliable tutor discovery and booking
    </footer>

    <!-- external JavaScript file -->
    <script src="scripts/main.js"></script>

    <!-- embedded style to show that we have separate CSS files (just a comment in code) 
         but actual CSS is linked: styles/main.css -->
</body>
</html>

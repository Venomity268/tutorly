<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorly - Find and book a tutor</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="hero-banner">
        <h1 class="page-title">Tutorly</h1>
        <p class="page-subtitle">Find the right tutor. Book in minutes.</p>
    </div>

    <div class="demo-container">
        <!-- header with navigation (semantic) -->
        <header class="demo-header">
            <div class="logo">
                <i class="fas fa-chalkboard-teacher"></i>
                <span>Tutorly</span>
            </div>
            <nav class="demo-nav">
                <button class="nav-btn" data-screen="onboarding">Onboarding</button>
                <button class="nav-btn" data-screen="search">Find Tutor</button>
                <button class="nav-btn" data-screen="profile">Profile</button>
                <button class="nav-btn" data-screen="booking">Book Session</button>
                <button class="nav-btn" data-screen="dashboard">Dashboard</button>
            </nav>
        </header>

        <main class="demo-content">
            <section class="screen active">
                <div class="screen-title">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Welcome to Tutorly</span>
                </div>
                <p class="screen-subtitle">Connect with qualified tutors. Sign in or create an account to get started.</p>
                <div class="landing-actions">
                    <a class="btn-primary" href="/pages/onboarding.html?mode=login"><i class="fas fa-sign-in-alt"></i> Sign In</a>
                    <a class="btn-secondary" href="/pages/onboarding.html?mode=register"><i class="fas fa-user-plus"></i> Create Account</a>
                </div>
            </section>
        </main>
    </div>
    
    <footer class="demo-footer">
        Tutorly • Built for reliable tutor discovery and booking
    </footer>

    <!-- external JavaScript file -->
    <script src="scripts/main.js"></script>

</body>
</html>
